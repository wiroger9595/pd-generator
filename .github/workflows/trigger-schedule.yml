name: Trigger Render Server scheduled tasks

on:
  schedule:
    # /health api
    - cron: '47 22 * * 1-5'
    - cron: '17 23 * * 1-5'
    - cron: '18 7 * * 1-5'
    - cron: '48 6 * * 1-5'
    # /api/daily-analysis/sell/us
    - cron: '30 23 * * 1-5'
    # /api/daily-analysis/buy/tw
    - cron: '0 7 * * 1-5'
    # /api/daily-analysis/buy/us
    - cron: '0 23 * * 1-5'
    # /api/daily-analysis/sell/tw
    - cron: '30 7 * * 1-5'
    # /api/fundamental/sell/tw  (台灣 16:00)
    - cron: '0 8 * * 1-5'
    # /api/fundamental/buy/tw   (台灣 16:30)
    - cron: '30 8 * * 1-5'
    # /api/fundamental/sell/us  (台灣 07:45)
    - cron: '45 23 * * 1-5'
    # /api/fundamental/buy/us   (台灣 21:00)
    - cron: '0 13 * * 1-5'
    # /api/chip/sell/tw  (台灣 17:15)
    - cron: '15 9 * * 1-5'
    # /api/chip/buy/tw   (台灣 17:45)
    - cron: '45 9 * * 1-5'
    # /api/chip/sell/us  (美東 22:15, 盤後)
    - cron: '15 22 * * 1-5'
    # /api/chip/buy/us   (台灣 22:15)
    - cron: '15 14 * * 1-5'
    # /api/news/sell/tw  (台灣 18:15)
    - cron: '15 10 * * 1-5'
    # /api/news/buy/tw   (台灣 18:45)
    - cron: '45 10 * * 1-5'
    # /api/news/sell/us  (美東 22:30, 盤後)
    - cron: '30 22 * * 1-5'
    # /api/news/buy/us   (台灣 22:30)
    - cron: '30 14 * * 1-5'
    # /api/summary/buy/tw  (台灣 19:00，四維掃描全部完成後)
    - cron: '0 11 * * 1-5'
    # /api/summary/buy/us  (美東 00:00，盤後四維彙整)
    - cron: '0 16 * * 1-5'
    # /api/summary/sell/tw  (台灣 19:30，三維賣出警示)
    - cron: '30 11 * * 1-5'
    # /api/summary/sell/us  (美東 00:30，三維賣出警示)
    - cron: '30 16 * * 1-5'
  workflow_dispatch: # 允許手動觸發測試

jobs:
  trigger-health:
    runs-on: ubuntu-latest
    if: github.event.schedule == '47 22 * * 1-5' || github.event.schedule == '17 23 * * 1-5' || github.event.schedule == '18 7 * * 1-5' || github.event.schedule == '48 6 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Call /health API
        run: |
          curl -sSf "https://pd-generator-2uwi.onrender.com/health"
          echo "Called /health API successfully"

  trigger-sell-us:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 23 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Call /api/daily-analysis/sell/us API
        run: |
          curl -X POST -sSf "https://pd-generator-2uwi.onrender.com/api/daily-analysis/sell/us"
          echo "Called /api/daily-analysis/sell/us API successfully"

  trigger-buy-tw:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Call /api/daily-analysis/buy/tw API
        run: |
          curl -X POST -sSf "https://pd-generator-2uwi.onrender.com/api/daily-analysis/buy/tw"
          echo "Called /api/daily-analysis/buy/tw API successfully"

  trigger-buy-us:
