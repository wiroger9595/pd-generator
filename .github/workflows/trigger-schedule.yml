name: Trigger Render Server scheduled tasks

on:
  schedule:
    # ── 保持 Render 活躍（避免 free plan 休眠）────────────────────────────
    - cron: '0 6 * * 1-5'    # UTC 06:00（台灣 14:00，台股盤中）
    - cron: '0 13 * * 1-5'   # UTC 13:00（美東 09:00，美股開盤前）

    # ── 台股每日統整（台灣 19:00 = UTC 11:00）──────────────────────────────
    - cron: '0 11 * * 1-5'

    # ── 美股每日統整（台灣 00:30 = UTC 16:30）──────────────────────────────
    - cron: '30 16 * * 1-5'

    # ── EOD 快取同步（台灣 20:00 = UTC 12:00）──────────────────────────────
    - cron: '0 12 * * 1-5'

    # ── 台股選股（台灣 20:30 = UTC 12:30，依賴 EOD sync）──────────────────
    - cron: '30 12 * * 1-5'

    # ── 美股選股（台灣 22:00 = UTC 14:00）──────────────────────────────────
    - cron: '0 14 * * 2-6'

  workflow_dispatch:  # 允許手動觸發測試


jobs:
  # ── 保持 Render 活躍 ────────────────────────────────────────────────────────
  wake-up:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 6 * * 1-5' ||
      github.event.schedule == '0 13 * * 1-5'
    steps:
      - name: Ping health endpoint
        run: |
          curl --connect-timeout 60 --max-time 120 --retry 3 \
            -sSf "https://pd-generator-2uwi.onrender.com/health"
          echo "Server alive at $(date -u)"

  # ── 台股每日統整（買進共振 + 賣出警示 → 一則 LINE）────────────────────────
  tw-daily-summary:
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 11 * * 1-5' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: POST /api/summary/daily/tw
        run: |
          curl -X POST \
            --connect-timeout 30 --max-time 300 --retry 2 \
            -sSf "https://pd-generator-2uwi.onrender.com/api/summary/daily/tw"
          echo "TW daily summary triggered at $(date -u)"

  # ── 美股每日統整（買進共振 + 賣出警示 → 一則 LINE）────────────────────────
  us-daily-summary:
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '30 16 * * 1-5' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: POST /api/summary/daily/us
        run: |
          curl -X POST \
            --connect-timeout 30 --max-time 300 --retry 2 \
            -sSf "https://pd-generator-2uwi.onrender.com/api/summary/daily/us"
          echo "US daily summary triggered at $(date -u)"

  # ── EOD 快取同步（台股籌碼+基本面，不發 LINE）────────────────────────────
  eod-sync-tw:
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 12 * * 1-5' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: POST /api/eod/sync/tw
        run: |
          curl -X POST \
            --connect-timeout 30 --max-time 300 --retry 2 \
            -sf "https://pd-generator-2uwi.onrender.com/api/eod/sync/tw" || true
          echo "EOD sync triggered at $(date -u)"

  # ── 台股選股（不發 LINE，Swagger 可查）──────────────────────────────────
  screener-tw:
    runs-on: ubuntu-latest
    needs: eod-sync-tw
    if: >
      github.event.schedule == '30 12 * * 1-5' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: POST /api/screener/tw
        run: |
          curl -X POST \
            --connect-timeout 30 --max-time 300 --retry 2 \
            -sf "https://pd-generator-2uwi.onrender.com/api/screener/tw" || true
          echo "TW screener triggered at $(date -u)"

  # ── 美股選股（不發 LINE，Swagger 可查）──────────────────────────────────
  screener-us:
    runs-on: ubuntu-latest
    if: >
      github.event.schedule == '0 14 * * 2-6' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: POST /api/screener/us
        run: |
          curl -X POST \
            --connect-timeout 30 --max-time 300 --retry 2 \
            -sf "https://pd-generator-2uwi.onrender.com/api/screener/us" || true
          echo "US screener triggered at $(date -u)"
